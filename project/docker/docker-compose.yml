version: '3'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # для расширений
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    depends_on:
      - db
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@localhost:5432/Monitoring
    env_file:
      - .env
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000  
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env
    working_dir: /app          # ← ДОБАВЬТЕ ЭТУ СТРОКУ
    command: celery -A src.workers.celery_app.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@localhost:5432/Monitoring

volumes:
  postgres_data: