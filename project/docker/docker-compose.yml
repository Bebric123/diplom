version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy  # ← ЖДЁМ ГОТОВНОСТЬ
      db:
        condition: service_started
    env_file:
      - .env
    volumes:
      # GGUF-модель: положите файл в project/docker/models/ → в контейнере /models/
      - ./models:/models:ro
    command: sh -c "alembic upgrade head && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    restart: on-failure
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./models:/models:ro
    # По умолчанию concurrency=1: каждый процесс грузит GGUF в RAM — при N≈числу CPU легко OOM → SIGKILL (см. логи WorkerLostError).
    command: sh -c "alembic upgrade head && celery -A src.workers.celery_app.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-1}"

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    restart: on-failure
    env_file:
      - .env
    working_dir: /app
    command: sh -c "alembic upgrade head && celery -A src.workers.celery_app.celery_app beat --loglevel=info"

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    depends_on:
      - redis
      - db
    env_file:
      - .env
    volumes:
      # Тот же том, что у backend/worker: обновление текста сообщения пересчитывает analyze_error (LLM)
      - ./models:/models:ro
    command: sh -c "alembic upgrade head && python -m src.services.telegram_bot"
    restart: on-failure

  # Периодический pg_dump: docker compose --profile backup up -d db-backup
  # BACKUP_INTERVAL_SEC в .env (по умолчанию 86400). Архивы в volume pg_backups (>14 дней удаляются).
  db-backup:
    profiles: ["backup"]
    image: postgres:15
    depends_on:
      db:
        condition: service_started
    env_file:
      - .env
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_INTERVAL_SEC: ${BACKUP_INTERVAL_SEC:-86400}
    volumes:
      - pg_backups:/backups
      - ./scripts/pg_backup_loop.sh:/pg_backup_loop.sh:ro
    entrypoint: ["/bin/bash", "/pg_backup_loop.sh"]
    restart: unless-stopped

volumes:
  postgres_data:
  pg_backups: